name: Update latest_data.json

on:
  schedule:
    # GitHub cron is UTC. 08:00 KST (UTC+9) == 23:00 UTC (previous day).
    - cron: "0 23 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Build dataset (finviz)
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          python -c "from pathlib import Path; import backend; cfg=backend.load_app_config(Path('config/app_config.json')); data=backend.build_dataset(cfg); backend.save_json(Path('data/latest_data.json'), data)"

      - name: Commit updated data
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git add data/latest_data.json
          git -c user.name="github-actions[bot]" -c user.email="github-actions[bot]@users.noreply.github.com" commit \
            -m "chore(data): update latest S&P 500 analyst snapshot" \
            --author="github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
          git push

